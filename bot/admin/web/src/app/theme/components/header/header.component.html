<div class="d-flex align-items-center justify-content-between w-100">
  <div class="logo-containter">
    <div
      class="logo"
      (click)="goToHome()"
    >
      <img
        class="logo-img"
        src="{{ baseHref }}assets/images/logo-black.svg"
      />
      <span class="logo-txt"> Tock Studio </span>
    </div>
  </div>

  <div class="header-tools">
    <div class="d-flex gap-1 align-items-center mode-switch">
      <button
        nbButton
        ghost
        size="medium"
        (click)="switchTheme()"
        [nbTooltip]="isDarkTheme() ? ('header.theme-switch-light' | transloco) : ('header.theme-switch-dark' | transloco)"
      >
        <nb-icon
          *ngIf="isDarkTheme()"
          icon="brightness-high"
        ></nb-icon>
        <nb-icon
          *ngIf="!isDarkTheme()"
          icon="moon"
        ></nb-icon>
      </button>
    </div>

    <nb-form-field *ngIf="state.currentApplication">
      <nb-icon
        nbPrefix
        icon="window"
      ></nb-icon>
      <nb-select
        (selectedChange)="changeApplication($event)"
        [ngModel]="currentApplicationName"
        [nbTooltip]="'header.select-application' | transloco"
        class="mb-0"
      >
        <nb-option
          *ngFor="let app of state.applications"
          [value]="app.name"
          >{{ app.label }}
        </nb-option>
      </nb-select>
    </nb-form-field>

    <nb-form-field *ngIf="state.namespaces">
      <nb-icon
        nbPrefix
        icon="folder"
      ></nb-icon>
      <nb-select
        (selectedChange)="changeNamespace($event)"
        [selected]="currentNamespaceName"
        [nbTooltip]="'header.select-namespace' | transloco"
        class="mb-0"
      >
        <nb-option
          *ngFor="let namespace of state.namespaces"
          [value]="namespace.namespace"
          >{{ namespace.displayLabel() }}
        </nb-option>
      </nb-select>
    </nb-form-field>

    <nb-form-field *ngIf="state.currentApplication">
      <nb-icon
        nbPrefix
        icon="globe2"
      ></nb-icon>
      <nb-select
        (selectedChange)="changeLocale($event)"
        [ngModel]="state.currentLocale"
        [nbTooltip]="'header.select-locale' | transloco"
        class="mb-0"
      >
        <nb-option
          *ngFor="let l of state.currentApplication.supportedLocales"
          [value]="l"
          >{{ state.localeName(l) }}</nb-option
        >
      </nb-select>
    </nb-form-field>

    <button
      nbButton
      ghost
      size="medium"
      (click)="goToDialogs()"
      [nbTooltip]="'header.go-to-dialogs' | transloco"
    >
      <nb-icon icon="wechat"></nb-icon>
    </button>

    <button
      nbButton
      ghost
      size="medium"
      (click)="openDialogTest()"
      [nbTooltip]="'header.open-test-dialog' | transloco"
    >
      <nb-icon icon="terminal-plus"></nb-icon>
    </button>

    <div class="border-left pl-3">
      <nb-select
        [selected]="transloco.getActiveLang()"
        (selectedChange)="setLang($event)"
        [nbTooltip]="'header.interface-language' | transloco"
      >
        <nb-option value="en">EN</nb-option>
        <nb-option value="fr">FR</nb-option>
      </nb-select>
    </div>

    <div
      *ngIf="auth.isLoggedIn() && !auth.isSSO()"
      class="border-left pl-3"
    >
      <button
        nbButton
        ghost
        size="medium"
        (click)="auth.logout()"
        [nbTooltip]="'header.logout' | transloco"
      >
        <nb-icon icon="box-arrow-right"></nb-icon>
      </button>
    </div>
  </div>
</div>
