<div class="dialog-summary shadow-sm py-1 pl-3 pr-1 d-flex align-items-center justify-content-between">
  <div class="d-flex gap-1 text-muted font-size-small">
    <div
      class="d-flex align-items-center pr-3 border-right"
      [nbTooltip]="getDialogConfigurationDetail()"
    >
      <img
        src="{{ getDialogConnectorIconUrl() }}"
        class="connector-icon align-text-top mr-2"
      />
      {{ getDialogConnectorLabel() }}
    </div>

    <div
      class="d-flex align-items-center"
      [nbTooltip]="'shared.chat-ui-dialog-logger.nb-user-inputs' | transloco"
    >
      <nb-icon
        icon="person"
        class="font-size-small mr-1"
      ></nb-icon>
      {{ nbUserQuestions() }}
    </div>
    <div
      class="d-flex align-items-center"
      [nbTooltip]="'shared.chat-ui-dialog-logger.nb-bot-responses' | transloco"
    >
      <nb-icon
        icon="robot"
        class="font-size-small mr-1"
      ></nb-icon>
      {{ nbBotAnswers() }}
    </div>
    <div
      class="d-flex align-items-center"
      [nbTooltip]="'shared.chat-ui-dialog-logger.nb-rag-answers' | transloco"
    >
      <nb-icon
        icon="lightbulb"
        class="font-size-small mr-1"
      ></nb-icon>
      {{ nbRagAnswers() }}
    </div>

    <div
      class="d-flex align-items-center"
      [nbTooltip]="'shared.chat-ui-dialog-logger.nb-annotations' | transloco"
      [class]="nbAnnotations() > 0 ? 'text-warning' : ''"
    >
      <nb-icon
        icon="exclamation-triangle-fill"
        class="font-size-small mr-1"
      ></nb-icon>
      {{ nbAnnotations() }}
    </div>
  </div>

  <button
    nbButton
    ghost
    size="small"
    [nbTooltip]="'shared.chat-ui-dialog-logger.replay-dialog' | transloco"
    (click)="replayDialog()"
  >
    <nb-icon icon="terminal-fill"></nb-icon>
  </button>
</div>

<div class="pt-3 pl-3 pb-3">
  <ng-container *ngFor="let action of dialog.actions; let first = first">
    <div
      *ngIf="$any(action).message.text || $any(action).message.messages?.length"
      class="dialogs-messages-grid"
      [class.mt-2]="!first && !action.isBot()"
    >
      <div class="flex-grow-1 align-self-center">
        <tock-chat-ui-message
          [message]="action.message"
          [date]="action.date"
          [reply]="action.isBot()"
          [replay]="true"
          [sender]="getUserName(action)"
          [avatar]="getUserAvatar(action)"
          [applicationId]="action.applicationId"
          id="action-anchor-{{ action.id }}"
          (click)="
            (userMessageIsClickable && !action.isBot()) || (botMessageIsClickable && action.isBot()) ? messageClicked(action) : undefined
          "
          [class.pointer]="(userMessageIsClickable && !action.isBot()) || (botMessageIsClickable && action.isBot())"
          [class.highlightedAction]="highlightedAction === action"
        >
          <div
            *ngIf="action._nlpStats"
            class="d-flex align-items-center justify-content-between font-size-small mt-n2"
          >
            <div
              class="locale-display"
              [nbTooltip]="state.localeName(action._nlpStats.locale)"
            >
              {{ normalizeLocaleCode(action._nlpStats.locale) }}
            </div>
          </div>

          <nb-icon
            icon="hand-thumbs-up-fill"
            class="text-success font-size-small mt-2"
            [nbTooltip]="'shared.chat-ui-dialog-logger.feedback-positive' | transloco"
            *ngIf="action.metadata?.feedback?.vote === feedbackVote.UP"
          ></nb-icon>
          <nb-icon
            icon="hand-thumbs-down-fill"
            class="text-danger font-size-small mt-2"
            [nbTooltip]="'shared.chat-ui-dialog-logger.feedback-negative' | transloco"
            *ngIf="action.metadata?.feedback?.vote === feedbackVote.DOWN"
          ></nb-icon>
        </tock-chat-ui-message>
      </div>

      <div
        class="dialog-vertical-separator"
        [class.horizontal-separation-start]="!action.isBot()"
        [class.horizontal-separation-end]="action.isBotAnswerWithContent()"
      ></div>

      <div>
        <div
          class="pl-1"
          *ngIf="!action.isBot()"
        >
          <button
            nbButton
            ghost
            size="small"
            [nbTooltip]="'shared.chat-ui-dialog-logger.replay-sentence' | transloco"
            (click)="testDialogSentence(action)"
          >
            <nb-icon icon="terminal-plus"></nb-icon>
          </button>

          <button
            *ngIf="action._nlpStats"
            (click)="displayNlpStats(action)"
            nbButton
            ghost
            size="small"
            [nbTooltip]="'shared.chat-ui-dialog-logger.show-nlp-stats' | transloco"
          >
            <nb-icon icon="clipboard-data"></nb-icon>
          </button>
        </div>

        <div
          class="pl-1"
          *ngIf="action.message?.isDebug()"
        >
          <div class="button-horizontal-separator mb-1"></div>

          <button
            nbButton
            ghost
            size="small"
            [nbTooltip]="'shared.chat-ui-dialog-logger.show-debug' | transloco"
            (click)="showDebug(action)"
            class="mb-1"
            *ngIf="$any(action).message?.data?.errorDetail"
          >
            <nb-icon icon="bug"></nb-icon>
          </button>

          <button
            nbButton
            ghost
            size="small"
            [nbTooltip]="'shared.chat-ui-dialog-logger.open-playground' | transloco"
            (click)="goToPlayground(action)"
            class="mb-1"
            *ngIf="$any(action).message?.data?.question_answering_prompt && isAdmin()"
          >
            <nb-icon icon="joystick"></nb-icon>
          </button>
        </div>

        <div
          class="pl-1"
          *ngIf="action.isBotAnswerWithContent()"
        >
          <div class="button-horizontal-separator mb-1"></div>

          <a
            nbButton
            ghost
            size="small"
            [nbTooltip]="'shared.chat-ui-dialog-logger.display-dialog-alone' | transloco"
            href="analytics/dialogs/{{ state.currentApplication.namespace }}/{{ state.currentApplication._id }}/{{ dialog.id }}#{{
              action.id
            }}"
          >
            <nb-icon icon="link"></nb-icon>
          </a>

          <div *ngIf="containsAnnotation(action); else does_not_contain_a_report">
            <button
              nbButton
              size="small"
              status="warning"
              ghost
              [nbTooltip]="'shared.chat-ui-dialog-logger.display-annotation' | transloco"
              (click)="openAnnotation(action)"
            >
              <nb-icon icon="exclamation-triangle-fill"></nb-icon>
            </button>
          </div>

          <ng-template #does_not_contain_a_report>
            <button
              nbButton
              size="small"
              ghost
              [nbTooltip]="'shared.chat-ui-dialog-logger.annotate-exchange' | transloco"
              (click)="openAnnotation(action)"
            >
              <nb-icon icon="exclamation-triangle"></nb-icon>
            </button>
          </ng-template>

          <button
            *ngIf="action.metadata?.isGenAiRagAnswer"
            nbButton
            size="small"
            ghost
            [nbTooltip]="'shared.chat-ui-dialog-logger.create-faq' | transloco"
            (click)="createFaq(action, dialog.actions)"
          >
            <nb-icon icon="chat-left-text"></nb-icon>
          </button>

          <button
            *ngIf="action.metadata?.observabilityInfo?.traceUrl"
            nbButton
            ghost
            size="small"
            [nbTooltip]="'shared.chat-ui-dialog-logger.view-observability' | transloco"
            (click)="openObservabilityTrace(action)"
          >
            <nb-icon icon="display"></nb-icon>
          </button>
        </div>
      </div>
    </div>
  </ng-container>
</div>
